<!-- Footer credit section with developer info and license -->
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="90" viewBox="0 0 900 90">
  <defs>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes heartBeat { 0%,100%{transform:scale(1)} 40%{transform:scale(1.3)} 60%{transform:scale(1.1)} }
    @keyframes dotPulse { 0%,100%{r:3;opacity:0.3} 50%{r:6;opacity:0.7} }
    @keyframes shineMove { 0%{transform:translateX(-200px)} 100%{transform:translateX(200px)} }
    @keyframes textFade { 0%,100%{opacity:1} 50%{opacity:0.7} }
    @keyframes starSpin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    @keyframes bounceSmall { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    .heart { animation:heartBeat 1.5s ease-in-out infinite; transform-origin:850px 68px }
    .d1 { animation:dotPulse 2s ease-in-out infinite }
    .d2 { animation:dotPulse 2s ease-in-out infinite; animation-delay:0.7s }
    .d3 { animation:dotPulse 2s ease-in-out infinite; animation-delay:1.4s }
    .tf { animation:textFade 3s ease-in-out infinite }
    .bs { animation:bounceSmall 2s ease-in-out infinite }
  </style>
  <rect x="0" y="0" width="900" height="90" rx="14" fill="url(#fBg)"/>
  <circle cx="60" cy="45" r="3" fill="#e94560" class="d1"/>
  <circle cx="840" cy="45" r="3" fill="#e94560" class="d2"/>
  <circle cx="450" cy="15" r="2" fill="#f39c12" class="d3"/>
  <rect x="0" y="0" width="900" height="90" rx="14" fill="#e94560" opacity="0.03">
    <animateTransform attributeName="transform" type="translate" values="-900,0;900,0" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="30" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="bold" fill="white" class="tf">Made By Shahzaib Mukhtiar</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" font-family="Segoe UI, Arial, sans-serif" fill="#bdc3c7" class="bs">Built with Python &amp; Tkinter  —  ⭐ Star if you like it!</text>
  <text x="450" y="70" text-anchor="middle" font-size="10" font-family="Segoe UI, Arial, sans-serif" fill="#7f8c8d">2026  ·  MIT License  ·  Free for everyone</text>
  <text x="850" y="75" text-anchor="middle" font-size="16" class="heart">❤️</text>
</svg>
 
